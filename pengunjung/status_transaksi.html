<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AQUACREST — Status Transaksi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <link rel="stylesheet" href="../css/pengunjung.css"/>
</head>
<body class="body-centered">

<div class="container-box">
  
  <div class="status-card" id="nota-cetak" style="box-shadow: 0 10px 30px rgba(0,0,0,.05);">
    <div class="success-icon" style="margin-top: 8px;"><i class="ti ti-circle-check"></i></div>
    <h4 class="fw-bold text-dark mb-1">Transaksi Terverifikasi</h4>
    <p class="text-muted" style="font-size:12px;">Pembayaran online berhasil diselesaikan.</p>

    <div class="info-table-status">
      <div class="info-row-status">
        <span class="info-label">Kode Booking</span>
        <span class="info-val" id="lbl-code">TRX-20260629-84721</span>
      </div>
      <div class="info-row-status">
        <span class="info-label">Email Penerima</span>
        <span class="info-val" id="lbl-email">budi.santoso@gmail.com</span>
      </div>
      <div class="info-row-status">
        <span class="info-label">Tanggal Kunjungan</span>
        <span class="info-val" id="lbl-tanggal">Min, 22 Jun 2025</span>
      </div>
      <div class="info-row-status">
        <span class="info-label">Status Tiket</span>
        <span class="info-val text-success" style="font-weight: 700;">ONLINE-VALID</span>
      </div>
    </div>

    <div class="qr-box-status">
      <i class="ti ti-qrcode" style="font-size:84px; color:#1a3a5c; display:block; margin-bottom: 4px;"></i>
      <span style="font-size:10px; font-family:monospace; color:#64748b; font-weight: 600;" id="lbl-ticket-id">ID: TKT-ON-84721</span>
    </div>
    
    <div style="font-size: 10px; color: #94a3b8; margin-top: 16px; font-weight: 500;">
      🌊 AQUACREST WATERPARK SYSTEM
    </div>
  </div>

  <div class="action-area-status">
    <a href="#" class="btn-action-status" onclick="unduhPDFNyata(event)">
      <i class="ti ti-download"></i> Unduh Nota E-Tiket PDF
    </a>
    <a href="../index.html" class="btn-back w-100 py-2" style="font-weight:600; font-size:13px; border-radius:10px;">
      <i class="ti ti-home" style="margin-right:6px;"></i> Kembali ke Beranda
    </a>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  
  if (params.has('code')) {
      const targetCode = params.get('code');
      document.getElementById('lbl-code').textContent = targetCode;
      document.getElementById('lbl-ticket-id').textContent = 'ID: TKT-ON-' + targetCode.slice(-5);
  }
  
  const savedEmail = sessionStorage.getItem('last_email') || 'budi.santoso@gmail.com';
  const savedDate = sessionStorage.getItem('last_date') || 'Min, 22 Jun 2025';

  document.getElementById('lbl-email').textContent = savedEmail;
  document.getElementById('lbl-tanggal').textContent = savedDate;

  function unduhPDFNyata(event) {
    event.preventDefault();
    const element = document.getElementById('nota-cetak');
    const bookingCode = document.getElementById('lbl-code').textContent;
    
    const opt = {
      margin:       12,
      filename:     'E-Tiket_AQUACREST_' + bookingCode + '.pdf',
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, useCORS: true }, 
      jsPDF:        { unit: 'mm', format: 'a5', orientation: 'portrait' }
    };
    
    html2pdf().set(opt).from(element).save();
  }
</script>
</body>
</html>
